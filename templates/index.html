<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MAIP — Market Access Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
--c-navy-950:#020818;--c-navy-900:#0A1628;--c-navy-800:#0A2463;--c-navy-700:#0D3B8A;--c-navy-600:#1E6091;
--c-blue-500:#0080C7;--c-blue-400:#00A3E0;--c-teal-400:#00C2CB;--c-teal-300:#4DD9E0;
--c-green-500:#1A936F;--c-amber-500:#D97706;--c-red-500:#C3423F;--c-purple-500:#7B2D8B;
--bg-app:#F0F4F8;--bg-panel:#FFFFFF;--bg-sidebar:#0A1628;--bg-card:#FFFFFF;--bg-input:#F8FAFC;--bg-code:#0A1628;
--text-primary:#0F172A;--text-secondary:#475569;--text-muted:#94A3B8;--text-on-dark:#E2E8F0;
--border:#E2E8F0;--border-dark:#CBD5E1;
--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.10);
--shadow-lg:0 10px 30px rgba(0,0,0,.12);--shadow-xl:0 20px 50px rgba(0,0,0,.16);
--font-sans:'IBM Plex Sans',-apple-system,Helvetica,sans-serif;--font-mono:'IBM Plex Mono','Courier New',monospace;
--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--sp-10:40px;
--r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;
--t-fast:0.15s ease;--t-base:0.25s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;line-height:1.6;color:var(--text-primary);background:var(--bg-app);-webkit-font-smoothing:antialiased}
h1{font-size:24px;font-weight:700;letter-spacing:-0.02em}
h2{font-size:18px;font-weight:600;letter-spacing:-0.01em}
h3{font-size:15px;font-weight:600}
h4{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)}
button{font-family:var(--font-sans);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-sans);font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:3px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.75)}}
@keyframes shimmer{from{background-position:-200px 0}to{background-position:200px 0}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.app-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:60px;background:var(--bg-sidebar);display:flex;flex-direction:column;align-items:center;padding:var(--sp-4) 0;transition:width var(--t-base);overflow:hidden;z-index:100;flex-shrink:0}
.sidebar:hover{width:220px}
.sidebar-logo{color:var(--c-teal-400);font-weight:700;font-size:18px;margin-bottom:var(--sp-8);white-space:nowrap;padding:0 var(--sp-4)}
.sidebar-nav{display:flex;flex-direction:column;gap:var(--sp-1);width:100%;flex:1}
.nav-item{display:flex;align-items:center;gap:var(--sp-3);padding:0 var(--sp-5);height:48px;color:var(--text-on-dark);opacity:.7;transition:all var(--t-fast);white-space:nowrap;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{opacity:1;background:rgba(255,255,255,.04)}
.nav-item.active{opacity:1;border-left-color:var(--c-teal-400);background:rgba(255,255,255,.07)}
.nav-icon{width:18px;text-align:center;flex-shrink:0}
.nav-label{overflow:hidden}

.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:56px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-6);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:var(--sp-3)}
.header-right{display:flex;align-items:center;gap:var(--sp-3)}
.header-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--c-teal-400);color:var(--c-navy-950)}
.btn{padding:8px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:all var(--t-fast);display:inline-flex;align-items:center;gap:var(--sp-2)}
.btn-primary{background:var(--c-navy-800);color:#fff}
.btn-primary:hover{background:var(--c-navy-700)}
.btn-secondary{background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-dark);background:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:32px;height:32px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.btn-icon:hover{background:var(--bg-input)}

.content{flex:1;overflow:hidden;display:flex}

/* Onboarding */
.onboarding{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:var(--sp-10);animation:fadeInUp .5s ease}
.onboarding h1{margin-bottom:var(--sp-3);color:var(--c-navy-800)}
.onboarding p{color:var(--text-secondary);max-width:500px;margin-bottom:var(--sp-8)}
.upload-zone{border:2px dashed var(--border-dark);border-radius:var(--r-xl);padding:var(--sp-10) var(--sp-8);cursor:pointer;transition:all var(--t-base);max-width:480px;width:100%}
.upload-zone:hover{border-color:var(--c-blue-500);background:rgba(0,128,199,.04)}
.upload-zone.dragover{border-color:var(--c-teal-400);background:rgba(0,194,203,.06)}
.upload-icon{font-size:48px;margin-bottom:var(--sp-4)}

/* Query Module */
.query-layout{display:flex;flex:1;overflow:hidden}
.chat-panel{width:45%;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-panel)}
.results-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-app)}
.chat-messages{flex:1;overflow-y:auto;padding:var(--sp-6)}
.chat-input-area{padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--border);background:var(--bg-panel)}
.chat-input-wrap{display:flex;gap:var(--sp-2);align-items:flex-end}
.chat-input{flex:1;resize:none;border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-3) var(--sp-4);background:var(--bg-input);line-height:1.5;max-height:120px;outline:none;transition:border-color var(--t-fast)}
.chat-input:focus{border-color:var(--c-blue-500)}
.send-btn{width:40px;height:40px;border-radius:var(--r-lg);background:var(--c-navy-800);color:#fff;display:flex;align-items:center;justify-content:center;transition:background var(--t-fast);flex-shrink:0}
.send-btn:hover{background:var(--c-navy-700)}
.send-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed}

.msg{margin-bottom:var(--sp-4);animation:fadeInUp .3s ease}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .msg-bubble{background:var(--c-navy-800);color:#fff;border-radius:18px 18px 4px 18px;max-width:80%;padding:var(--sp-3) var(--sp-4);font-size:13px}
.msg-ai{display:flex;justify-content:flex-start}
.msg-ai .msg-bubble{background:var(--bg-panel);border:1px solid var(--border);border-radius:18px 18px 18px 4px;max-width:90%;padding:var(--sp-4);font-size:13px;line-height:1.6}
.msg-section{margin-bottom:var(--sp-3)}
.msg-finding{font-weight:700;color:var(--c-navy-800);font-size:14px}
.msg-data{background:var(--bg-input);border-left:3px solid var(--c-blue-500);font-family:var(--font-mono);padding:var(--sp-2) var(--sp-3);font-size:12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin:var(--sp-2) 0;white-space:pre-wrap}
.msg-context{color:var(--text-secondary)}
.msg-signal{border-left:3px solid var(--c-amber-500);background:#FFFBEB;padding:var(--sp-2) var(--sp-3);border-radius:0 var(--r-sm) var(--r-sm) 0;margin:var(--sp-2) 0;font-size:13px}
.msg-suggest{display:inline-block;border:1px solid var(--border);padding:var(--sp-1) var(--sp-3);border-radius:20px;font-size:12px;cursor:pointer;transition:all var(--t-fast);color:var(--c-navy-800);margin-top:var(--sp-2)}
.msg-suggest:hover{border-color:var(--c-navy-800);background:var(--bg-input)}

.confidence-dot{display:inline-flex;align-items:center;gap:var(--sp-1);font-size:11px;margin-top:var(--sp-2)}
.confidence-dot.high{color:#16A34A}
.confidence-dot.medium{color:var(--c-amber-500)}
.confidence-dot.low{color:#DC2626}

.thinking{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3);color:var(--text-muted);font-size:13px}
.thinking-dots{display:flex;gap:4px}
.thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--c-blue-500);animation:blink 1.2s infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}

.example-chips{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2);margin-top:var(--sp-4)}
.example-chip{padding:var(--sp-2) var(--sp-3);border:1px solid var(--border);border-radius:var(--r-md);font-size:12px;cursor:pointer;transition:all var(--t-fast);text-align:left;color:var(--text-secondary);background:var(--bg-panel)}
.example-chip:hover{border-color:var(--c-navy-800);color:var(--text-primary);background:var(--bg-input)}

.stat-chips{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-3)}
.stat-chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;background:var(--bg-input);color:var(--text-secondary);font-family:var(--font-mono)}

/* Results */
.results-header{padding:var(--sp-4) var(--sp-6);border-bottom:1px solid var(--border);background:var(--bg-panel);display:flex;align-items:center;gap:var(--sp-4)}
.tab{padding:var(--sp-2) var(--sp-4);font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;cursor:pointer;transition:all var(--t-fast)}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--c-navy-800);border-bottom-color:var(--c-navy-800)}
.results-body{flex:1;overflow-y:auto;padding:var(--sp-4) var(--sp-6)}

.stats-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--sp-3);margin-bottom:var(--sp-4)}
.stat-tile{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-sm)}
.stat-tile-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:2px}
.stat-tile-value{font-size:22px;font-weight:700;color:var(--c-navy-800);font-family:var(--font-mono)}

.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table thead{position:sticky;top:0;z-index:2}
.data-table th{background:var(--c-navy-800);color:#fff;padding:var(--sp-2) var(--sp-3);text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.data-table td{padding:var(--sp-2) var(--sp-3);border-bottom:1px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.data-table tr:hover td{background:var(--bg-input)}
.status-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.pagination{display:flex;align-items:center;justify-content:center;gap:var(--sp-2);padding:var(--sp-4) 0}
.page-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--bg-panel)}
.page-btn:hover{background:var(--bg-input)}
.page-btn.active{background:var(--c-navy-800);color:#fff;border-color:var(--c-navy-800)}
.page-info{font-size:12px;color:var(--text-muted);margin:0 var(--sp-2)}

.chart-container{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-4);box-shadow:var(--shadow-sm)}
.chart-caption{font-size:11px;color:var(--text-muted);text-align:center;margin-top:var(--sp-2)}

/* Dashboard */
.dashboard{padding:var(--sp-6);overflow-y:auto;flex:1}
.dashboard-grid{display:grid;gap:var(--sp-4)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--sp-4)}
.kpi-tile{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5);box-shadow:var(--shadow-sm);border-left:3px solid var(--c-blue-500)}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.kpi-value{font-size:28px;font-weight:700;color:var(--c-navy-800);font-family:var(--font-mono);margin:var(--sp-1) 0}
.kpi-sub{font-size:12px;color:var(--text-secondary)}
.two-panel{display:grid;grid-template-columns:3fr 2fr;gap:var(--sp-4);margin-top:var(--sp-4)}
.panel-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5);box-shadow:var(--shadow-sm)}
.panel-card h3{margin-bottom:var(--sp-3)}
.gap-item{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) 0;border-bottom:1px solid var(--border);font-size:12px}
.gap-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Market Intelligence */
.mi-layout{display:flex;flex:1;overflow:hidden}
.mi-sidebar{width:280px;border-right:1px solid var(--border);padding:var(--sp-4);overflow-y:auto;background:var(--bg-panel)}
.mi-content{flex:1;overflow-y:auto;padding:var(--sp-6)}
.mi-select{width:100%;padding:var(--sp-2) var(--sp-3);border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-input);margin-bottom:var(--sp-3);font-size:13px}
.mi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:var(--sp-1);display:block}
.intel-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-md);margin-bottom:var(--sp-4);animation:slideInRight .3s ease;overflow:hidden}
.intel-card-header{padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;font-size:12px}
.intel-card-body{padding:var(--sp-4);font-size:13px;line-height:1.7;white-space:pre-wrap}
.intel-card-body h2{font-size:14px;color:var(--c-navy-800);margin:var(--sp-3) 0 var(--sp-2)}
.intel-card-footer{padding:var(--sp-2) var(--sp-4);border-top:1px solid var(--border);display:flex;gap:var(--sp-2)}
.intel-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeInUp .2s ease}
.modal{background:var(--bg-panel);border-radius:var(--r-xl);box-shadow:var(--shadow-xl);max-width:640px;width:90%;max-height:85vh;overflow-y:auto;animation:fadeInUp .3s ease}
.modal-header{padding:var(--sp-5) var(--sp-6);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:var(--sp-5) var(--sp-6)}
.modal-footer{padding:var(--sp-4) var(--sp-6);border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:var(--sp-3)}

.wizard-steps{display:flex;gap:var(--sp-4);margin-bottom:var(--sp-5)}
.wizard-step{display:flex;align-items:center;gap:var(--sp-2);font-size:13px;color:var(--text-muted)}
.wizard-step.active{color:var(--c-navy-800);font-weight:600}
.wizard-step.done{color:var(--c-green-500)}
.wizard-num{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.wizard-step.active .wizard-num{border-color:var(--c-navy-800);background:var(--c-navy-800);color:#fff}
.wizard-step.done .wizard-num{border-color:var(--c-green-500);background:var(--c-green-500);color:#fff}

.schema-table{width:100%;border-collapse:collapse;font-size:12px;margin:var(--sp-3) 0}
.schema-table th,.schema-table td{padding:var(--sp-2) var(--sp-3);border:1px solid var(--border);text-align:left}
.schema-table th{background:var(--bg-input);font-weight:600}
.quality-gauge{display:flex;align-items:center;gap:var(--sp-3);margin:var(--sp-3) 0}
.quality-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.quality-fill{height:100%;border-radius:4px;transition:width .5s ease}
.capability-list{list-style:none;margin:var(--sp-3) 0}
.capability-list li{padding:var(--sp-1) 0;font-size:13px}

.settings-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) 0;border-bottom:1px solid var(--border)}
.settings-row label{font-size:13px;font-weight:500}
.settings-row select{padding:var(--sp-1) var(--sp-3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px}

.filter-summary{font-size:13px;line-height:1.8}
.filter-item{display:flex;gap:var(--sp-2);align-items:baseline}
.filter-field{font-weight:600;color:var(--c-navy-800)}
.filter-val{font-family:var(--font-mono);color:var(--c-blue-500)}

.zero-suggestions{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-3)}
.zero-chip{padding:var(--sp-1) var(--sp-3);border:1px solid var(--c-amber-500);border-radius:16px;font-size:12px;cursor:pointer;color:var(--c-amber-500);transition:all var(--t-fast)}
.zero-chip:hover{background:var(--c-amber-500);color:#fff}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--c-blue-500);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.research-error-banner{display:flex;align-items:center;gap:10px;background:#1e1e2e;border-left:4px solid #f59e0b;border-radius:6px;padding:12px 16px;margin:12px 0;font-size:14px;color:#e2e8f0}
.research-error-banner .error-icon{font-size:16px;flex-shrink:0}
.research-error-banner .error-text{flex:1}
.research-error-banner .retry-btn{margin-left:auto;background:#3b82f6;color:white;border:none;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.research-error-banner .retry-btn:hover{background:#2563eb}
.token-chip{display:inline-flex;align-items:center;gap:6px;background:#0f172a;border:1px solid #1e293b;border-radius:99px;padding:4px 10px 4px 8px;font-size:11px;color:#cbd5e1;white-space:nowrap;cursor:default;user-select:none}
.token-chip--loading{opacity:0.5;pointer-events:none}
.access-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary,#0f1117)}
.access-gate-card{background:var(--bg-secondary,#1a1d27);border:1px solid var(--border,#2a2d3a);border-radius:12px;padding:40px;width:360px;text-align:center}
.access-gate-card h2{font-size:1.4rem;font-weight:600;margin-bottom:8px}
.access-gate-card p{color:var(--text-secondary,#8b8fa8);margin-bottom:24px;font-size:0.9rem}
.access-gate-input{width:100%;padding:10px 14px;background:#1e2130;border:1px solid #3a3f55;border-radius:8px;color:#e2e4f0;-webkit-text-fill-color:#e2e4f0;font-size:0.95rem;margin-bottom:16px;box-sizing:border-box}
.access-gate-input:focus{outline:none;border-color:#4f6ef7;box-shadow:0 0 0 3px rgba(79,110,247,0.2)}
.access-gate-btn{width:100%;padding:10px;background:var(--accent,#4f6ef7);color:#fff;border:none;border-radius:8px;font-size:0.95rem;cursor:pointer;font-weight:500}
.access-gate-btn:disabled{opacity:0.6;cursor:not-allowed}
.access-gate-error{color:#f87171;font-size:0.85rem;margin-top:12px}
.access-gate-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;padding:0;line-height:1;opacity:0.6}
.access-gate-toggle:hover{opacity:1}
.tc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tc-track{width:40px;height:4px;background:#1e293b;border-radius:99px;overflow:hidden;flex-shrink:0}
.tc-fill{height:100%;border-radius:99px;transition:width .5s ease,background .3s ease}
.tc-label{color:#94a3b8}
.tc-calls{color:#64748b;margin-left:2px}

/* ── Leadership Summary Card ─────────────────── */
.ls-wrapper {
  margin-bottom: 20px;
  font-family: 'DM Sans', 'Inter', sans-serif;
}
.ls-toggle-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 20px;
  background: linear-gradient(135deg, #1e2a5e 0%, #16204a 100%);
  border: 1px solid #4f6ef7;
  border-radius: 10px;
  cursor: pointer;
  color: #ffffff !important;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.2s ease;
  box-shadow: 0 0 0 0 rgba(79,110,247,0);
}
.ls-toggle-btn:hover {
  background: linear-gradient(135deg, #253475 0%, #1e2a5e 100%);
  border-color: #7b9bff;
  box-shadow: 0 0 18px rgba(79,110,247,0.25);
  color: #ffffff !important;
}
.ls-toggle-label {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #ffffff !important;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
}
.ls-toggle-label::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #4f6ef7;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(79,110,247,0.9);
  flex-shrink: 0;
}
.ls-toggle-chevron {
  font-size: 0.65rem;
  opacity: 0.8;
  margin-left: 10px;
  color: #a0b0ff !important;
  transition: transform 0.2s ease;
}
.ls-card {
  margin-top: 6px;
  background: #12151f;
  border: 1px solid rgba(79,110,247,0.25);
  border-radius: 10px;
  overflow: hidden;
}
.ls-card-header {
  padding: 10px 20px;
  background: rgba(79,110,247,0.08);
  border-bottom: 1px solid rgba(79,110,247,0.15);
}
.ls-meta {
  font-size: 0.72rem;
  color: #7b85c4 !important;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
}
.ls-fields {
  padding: 16px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.ls-field-row {
  display: grid;
  grid-template-columns: 195px 1fr;
  gap: 16px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.84rem;
}
.ls-field-row:last-child {
  border-bottom: none;
}
.ls-field-label {
  color: #7b85c4 !important;
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.02em;
  padding-top: 1px;
  white-space: nowrap;
}
.ls-field-value {
  color: #dde2f5 !important;
  line-height: 1.55;
  font-size: 0.84rem;
  font-weight: 400;
}
.ls-signal {
  margin: 12px 20px 20px;
  padding: 14px 18px;
  background: linear-gradient(135deg, rgba(79,110,247,0.14) 0%, rgba(99,130,255,0.08) 100%);
  border-left: 3px solid #4f6ef7;
  border-radius: 0 8px 8px 0;
}
.ls-signal-label {
  display: block;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  color: #4f6ef7 !important;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.ls-signal-text {
  margin: 0;
  font-size: 0.88rem;
  color: #eef0fa !important;
  line-height: 1.65;
  font-weight: 500;
}
.ls-loading {
  padding: 24px 20px;
  font-size: 0.84rem;
  color: #7b85c4 !important;
  text-align: center;
  letter-spacing: 0.03em;
}
.ls-error {
  padding: 16px 20px;
  font-size: 0.84rem;
  color: #f87171 !important;
  font-weight: 500;
}
/* ── Leadership Briefing PDF Export ─────────── */
.ls-export-row {
  padding: 12px 20px 18px;
  display: flex;
  justify-content: flex-end;
}
.ls-export-btn {
  padding: 8px 18px;
  background: rgba(79,110,247,0.1);
  border: 1px solid rgba(79,110,247,0.3);
  border-radius: 8px;
  color: #a0b0ff !important;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
}
.ls-export-btn:hover:not(:disabled) {
  background: rgba(79,110,247,0.2);
  border-color: #4f6ef7;
  color: #ffffff !important;
}
.ls-export-btn-disabled,
.ls-export-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
/* ── Recommendation Engine ───────────────────── */
.rec-bar {
  margin-top: 10px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  flex-wrap: wrap;
}
.rec-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #7b85c4;
  white-space: nowrap;
  padding-top: 10px;
  flex-shrink: 0;
}
.rec-pills {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.rec-pill {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(79,110,247,0.06);
  border: 1px solid rgba(79,110,247,0.18);
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  width: 100%;
}
.rec-pill:hover {
  background: rgba(79,110,247,0.14);
  border-color: rgba(79,110,247,0.4);
}
.rec-pill-icon {
  font-size: 1rem;
  flex-shrink: 0;
  margin-top: 1px;
}
.rec-pill-text {
  font-size: 0.82rem;
  font-weight: 600;
  color: #a0b0ff;
  white-space: nowrap;
  flex-shrink: 0;
}
.rec-pill-reason {
  font-size: 0.78rem;
  color: #7b85c4;
  line-height: 1.4;
}
.rec-pill:hover .rec-pill-text   { color: #ffffff; }
.rec-pill:hover .rec-pill-reason { color: #a0b0ff; }
/* ── Indication Coverage Panel ───────────────── */
.cov-panel {
  margin-top: 16px;
  background: #0d1020;
  border: 1px solid rgba(79,110,247,0.2);
  border-radius: 12px;
  overflow: hidden;
}
.cov-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: rgba(79,110,247,0.07);
  border-bottom: 1px solid rgba(79,110,247,0.15);
}
.cov-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.cov-icon { font-size: 1.1rem; }
.cov-label {
  margin: 0 0 2px;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #4f6ef7;
}
.cov-title {
  margin: 0;
  font-size: 0.82rem;
  font-weight: 700;
  color: #dde2f5;
}
.cov-score-wrap { text-align: right; }
.cov-score-num {
  display: block;
  font-size: 1.4rem;
  font-weight: 800;
  line-height: 1;
}
.cov-score-label {
  font-size: 0.68rem;
  color: #4a5080;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.cov-tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.cov-tile {
  padding: 12px 8px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.cov-tile:last-child { border-right: none; }
.cov-tile-count {
  display: block;
  font-size: 1.3rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.cov-tile-label {
  display: block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.cov-loading {
  padding: 20px;
  text-align: center;
  font-size: 0.82rem;
  color: #4a5080;
}
.cov-error {
  padding: 14px 18px;
  font-size: 0.82rem;
  color: #f87171;
}
.cov-bar-wrap {
  padding: 12px 18px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cov-bar-track {
  display: flex;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
  margin-bottom: 6px;
}
.cov-bar-segment {
  height: 100%;
  transition: width 0.6s ease;
}
.cov-bar-label {
  font-size: 0.72rem;
  color: #4a5080;
}
.cov-table-wrap { overflow-x: auto; }
.cov-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.81rem;
}
.cov-table thead tr {
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02);
}
.cov-table th {
  padding: 9px 16px;
  text-align: left;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #4a5080;
  white-space: nowrap;
}
.cov-row {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.cov-row:hover { background: rgba(255,255,255,0.02); }
.cov-td { padding: 10px 16px; vertical-align: middle; }
.cov-td-fda { color: #dde2f5; font-weight: 500; }
.cov-td-ds { color: #7b85c4; font-size: 0.78rem; }
.cov-not-tracked {
  color: #4a5080;
  font-style: italic;
  font-size: 0.76rem;
}
.cov-status-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  white-space: nowrap;
}
.cov-footer {
  padding: 8px 18px;
  font-size: 0.7rem;
  color: #4a5080;
  font-style: italic;
  border-top: 1px solid rgba(255,255,255,0.04);
}
/* ── Indication Lookup ───────────────────────── */
.ind-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ind-input-padded {
  flex: 1;
  padding-right: 8px;
}
.ind-lookup-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  background: rgba(79,110,247,0.1);
  border: 1px solid rgba(79,110,247,0.3);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 0;
}
.ind-lookup-btn:hover:not(:disabled) {
  background: rgba(79,110,247,0.2);
  border-color: #4f6ef7;
}
.ind-lookup-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.ind-lookup-btn-loading {
  animation: ind-spin 1s linear infinite;
}
@keyframes ind-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.ind-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: #12151f;
  border: 1px solid rgba(79,110,247,0.3);
  border-radius: 10px;
  z-index: 500;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  overflow: hidden;
  min-width: 260px;
}
.ind-dropdown-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(79,110,247,0.07);
}
.ind-dropdown-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: #a0b0ff;
  letter-spacing: 0.03em;
}
.ind-dropdown-close {
  background: none;
  border: none;
  color: #4a5080;
  cursor: pointer;
  font-size: 0.75rem;
  padding: 0 2px;
  line-height: 1;
}
.ind-dropdown-close:hover { color: #f87171; }
.ind-filter-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.ind-filter-tab {
  flex: 1;
  padding: 7px 4px;
  background: none;
  border: none;
  font-size: 0.72rem;
  font-weight: 600;
  color: #4a5080;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
}
.ind-filter-tab:hover { color: #7b85c4; }
.ind-filter-tab-active {
  color: #a0b0ff;
  border-bottom-color: #4f6ef7;
}
.ind-dropdown-loading,
.ind-dropdown-empty {
  padding: 16px 14px;
  font-size: 0.82rem;
  color: #4a5080;
  text-align: center;
}
.ind-dropdown-error {
  padding: 12px 14px;
  font-size: 0.8rem;
  color: #f87171;
}
.ind-list {
  list-style: none;
  margin: 0;
  padding: 6px 0;
  max-height: 240px;
  overflow-y: auto;
}
.ind-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
}
.ind-item:hover { background: rgba(79,110,247,0.1); }
.ind-item-selected { background: rgba(79,110,247,0.15); }
.ind-item-label {
  font-size: 0.84rem;
  color: #dde2f5;
  font-weight: 500;
  flex: 1;
}
.ind-item:hover .ind-item-label { color: #ffffff; }
.ind-item-source {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}
.ind-source-dataset {
  background: rgba(52,211,153,0.12);
  color: #34d399;
  border: 1px solid rgba(52,211,153,0.25);
}
.ind-source-fda-ema {
  background: rgba(79,110,247,0.12);
  color: #a0b0ff;
  border: 1px solid rgba(79,110,247,0.25);
}
.ind-dropdown-footer {
  padding: 8px 14px;
  font-size: 0.72rem;
  color: #4a5080;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.02);
}
/* ── Cross-Market Comparison ─────────────────── */
.cmp-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1002;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}
.cmp-panel {
  background: #0f1117;
  border: 1px solid rgba(79,110,247,0.3);
  border-radius: 16px;
  width: 100%;
  max-width: 1020px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  margin-bottom: 40px;
}
.cmp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(79,110,247,0.06);
}
.cmp-label {
  margin: 0 0 4px;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #4f6ef7;
}
.cmp-title {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 700;
  color: #eef0fa;
}
.cmp-market-bar {
  display: grid;
  grid-template-columns: 175px 1fr 1fr;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.cmp-market-head {
  padding: 14px 20px;
  font-size: 0.88rem;
  font-weight: 700;
  text-align: center;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.cmp-a { color: #60a5fa; }
.cmp-b { color: #a78bfa; }
.cmp-body { padding: 0; }
.cmp-row {
  display: grid;
  grid-template-columns: 175px 1fr 1fr;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.cmp-row:hover { background: rgba(255,255,255,0.02); }
.cmp-row-label {
  padding: 14px 20px;
  font-size: 0.76rem;
  font-weight: 700;
  color: #7b85c4;
  letter-spacing: 0.03em;
  display: flex;
  align-items: flex-start;
  padding-top: 16px;
}
.cmp-cell {
  padding: 12px 20px;
  font-size: 0.83rem;
  color: #dde2f5;
  line-height: 1.55;
  border-left: 1px solid rgba(255,255,255,0.05);
}
.cmp-cell-a { border-left-color: rgba(96,165,250,0.15); }
.cmp-cell-b { border-left-color: rgba(167,139,250,0.15); }
.cmp-signal-row {
  display: grid;
  grid-template-columns: 175px 1fr 1fr;
  background: rgba(79,110,247,0.05);
  border-top: 1px solid rgba(79,110,247,0.15);
}
.cmp-signal-cell {
  padding: 16px 20px;
  font-size: 0.85rem;
  font-weight: 500;
  color: #eef0fa;
  line-height: 1.6;
  border-left: 1px solid rgba(255,255,255,0.05);
}
.cmp-benchmark-note {
  padding: 12px 20px;
  font-size: 0.75rem;
  color: #4a5080;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-style: italic;
}
.ls-compare-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px 14px;
}
.ls-compare-input {
  flex: 1;
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #dde2f5 !important;
  font-size: 0.8rem;
  -webkit-text-fill-color: #dde2f5;
  transition: border-color 0.2s;
}
.ls-compare-input::placeholder { color: #4a5080; }
.ls-compare-input:focus {
  outline: none;
  border-color: rgba(167,139,250,0.5);
}
.ls-compare-btn {
  padding: 8px 14px;
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 8px;
  color: #c4b5fd !important;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.ls-compare-btn:hover:not(:disabled) {
  background: rgba(167,139,250,0.2);
  border-color: #a78bfa;
  color: #ffffff !important;
}
.ls-compare-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
/* ── Gap Market Priority Score ───────────────── */
.gap-nav-btn {
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: background 0.2s;
  display: block;
  width: 100%;
  text-align: center;
}
.gap-nav-btn:hover { background: rgba(255,255,255,0.08); }
.gap-nav-btn-disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.gap-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}
.gap-panel {
  background: #0f1117;
  border: 1px solid rgba(79,110,247,0.3);
  border-radius: 16px;
  width: 100%;
  max-width: 1100px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}
.gap-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(79,110,247,0.06);
}
.gap-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.gap-header-icon { font-size: 1.6rem; }
.gap-title {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 700;
  color: #eef0fa;
}
.gap-subtitle {
  margin: 3px 0 0;
  font-size: 0.8rem;
  color: #7b85c4;
}
.gap-close {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #8b8fa8;
  cursor: pointer;
  font-size: 0.9rem;
  padding: 6px 12px;
  transition: all 0.2s;
}
.gap-close:hover {
  background: rgba(248,113,113,0.15);
  border-color: rgba(248,113,113,0.4);
  color: #f87171;
}
.gap-tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 20px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.gap-tile {

  src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"

<script type="text/babel">
const {useState,useEffect,useReducer,useRef,useCallback,useMemo}=React;

const CHART_COLORS=['#0A2463','#1E6091','#1A936F','#C3423F','#F18F01','#7B2D8B','#2D6A4F','#E9C46A','#264653','#E76F51','#0891B2','#DB2777'];

const initialState={
  sessionId:null,filename:null,rowCount:0,schema:null,profile:null,dataQuality:null,
  activeModule:'dashboard',messages:[],results:null,chart:null,stats:null,page:1,loading:false,
  confidence:null,suggestions:[],researchCards:[],researchLoading:false,
  selectedProduct:null,selectedCountry:null,selectedIndication:null,
  kpiData:null,gapAnalysis:null,scenarios:[],annotations:{},
  uploadStep:1,uploadFile:null,uploadParsed:null,uploadSchema:null,showUpload:false,showSettings:false,
  m1Model:'haiku',m2Model:'sonnet',resultTab:'table',filterSpec:null
};

function reducer(state,action){
  switch(action.type){
    case 'SET':return{...state,...action.payload};
    case 'ADD_MSG':return{...state,messages:[...state.messages,action.payload]};
    case 'ADD_RESEARCH':return{...state,researchCards:[action.payload,...state.researchCards]};
    case 'REMOVE_RESEARCH':return{...state,researchCards:state.researchCards.filter((_,i)=>i!==action.index)};
    case 'RESET_UPLOAD':return{...state,uploadStep:1,uploadFile:null,uploadParsed:null,uploadSchema:null,showUpload:false};
    default:return state;
  }
}

function api(path,opts={}){
  const base={headers:{'Content-Type':'application/json','x-access-key':sessionStorage.getItem('maip_access_key')||''}};
  return fetch(path,{...base,...opts,headers:{...base.headers,...(opts.headers||{})}}).then(r=>{
    if(!r.ok)return r.json().then(e=>{throw new Error(e.detail||e.error||'Request failed')});
    return r.json();
  });
}

function generateExamples(profile,schema){
  if(!profile||!schema)return[];
  const ex=[];const roles=schema.roles||{};
  const pv=profile.productValues||[];const cv=profile.countryValues||[];
  const sv=profile.statusValues||[];const rv=profile.regionValues||[];
  if(pv.length>0)ex.push(`Show all records for ${pv[0]}`);
  if(sv.length>0)ex.push(`How many ${sv[0]} entries?`);
  if(pv.length>0)ex.push(`Bar chart by product`);
  if(cv.length>0)ex.push(`Show records for ${cv[0]}`);
  if(rv.length>0)ex.push(`Pie chart by region`);
  if(sv.length>1)ex.push(`Count ${sv[1]} records`);
  if(pv.length>1&&cv.length>0)ex.push(`${pv[1]} in ${cv[0]}`);
  ex.push('Line chart over time');
  return ex.slice(0,8);
}

// ─── Chart.js Utilities ───
function selectChartType(chartData) {
  /*
    Determines chart type from data shape.
    Zero AI tokens consumed. Runs client-side only.
    Rules (in priority order):
    1. Time-series (Period dimension present, single metric) → line (untouched)
    2. Multiple groups + single period + status breakdown → stacked bar
    3. Multiple products OR countries, single period      → clustered bar
    4. Single group comparison (≤2 values)               → horizontal bar
    5. Fallback                                           → clustered bar
  */
  if (!chartData || !chartData.labels || chartData.labels.length === 0) {
    return 'clustered_bar';
  }
  const hasPeriod = chartData.dimension === 'period' ||
                    (chartData.labels[0] && /^\d{4}-Q\d$/.test(chartData.labels[0]));
  if (hasPeriod) return 'line'; // preserve existing line logic
  const hasStatusBreakdown = chartData.datasets && chartData.datasets.length > 1;
  const labelCount = chartData.labels.length;
  if (hasStatusBreakdown) return 'stacked_bar';
  if (labelCount <= 2)     return 'horizontal_bar';
  return 'clustered_bar';
}

// Store chart instance to allow clean destroy-on-redraw
let _maipChartInstance = null;
function renderBarChart(canvasId, chartData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  // Destroy existing instance — prevents Chart.js ghost overlay
  if (_maipChartInstance) {
    _maipChartInstance.destroy();
    _maipChartInstance = null;
  }
  const chartType = selectChartType(chartData);
  const isHorizontal = chartType === 'horizontal_bar';
  const isStacked    = chartType === 'stacked_bar';
  // Color palette — accessible, professional, dark-bg optimized
  const PALETTE = [
    '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6',
    '#ef4444', '#06b6d4', '#f97316', '#84cc16'
  ];
  // Build Chart.js datasets
  const datasets = (chartData.datasets || [
    { label: chartData.label || 'Count', data: chartData.values || [] }
  ]).map((ds, i) => ({
    label: ds.label || '',
    data: ds.data || ds.values || [],
    backgroundColor: PALETTE[i % PALETTE.length] + (isStacked ? 'cc' : 'dd'),
    borderColor:     PALETTE[i % PALETTE.length],
    borderWidth: 1,
    borderRadius: isHorizontal ? 3 : 4,
    borderSkipped: false
  }));
  const config = {
    type: 'bar',
    data: { labels: chartData.labels || [], datasets: datasets },
    options: {
      indexAxis: isHorizontal ? 'y' : 'x',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'top',
          labels: { color: '#475569', font: { size: 12 }, boxWidth: 12, padding: 16 }
        },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#f1f5f9',
          bodyColor: '#cbd5e1', borderColor: '#334155',
          borderWidth: 1, padding: 10,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed[isHorizontal ? 'x' : 'y']}` }
        }
      },
      scales: {
        x: { stacked: isStacked, grid: { color: '#E2E8F0' }, ticks: { color: '#64748b', font: { size: 11 }, maxRotation: 35 } },
        y: { stacked: isStacked, grid: { color: '#E2E8F0' }, ticks: { color: '#64748b', font: { size: 11 } }, beginAtZero: true }
      },
      animation: { duration: 400 }
    }
  };
  _maipChartInstance = new Chart(canvas, config);
}

// ─── React wrapper for Chart.js bar charts ───
function ChartJSBar({data, title, xField, chartData}) {
  const canvasRef = useRef(null);
  const instanceRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;

    // Transform to Chart.js format
    let labels, values, dimensionKey, labelText;
    if (chartData) {
      labels      = (chartData.data||[]).map(d=>d.name);
      values      = (chartData.data||[]).map(d=>d.value);
      dimensionKey= chartData.dimension || (chartData.x_field||'').toLowerCase() || 'product';
      labelText   = chartData.title || 'Count';
    } else if (data) {
      labels      = data.map(d=>d.name);
      values      = data.map(d=>d.value);
      dimensionKey= xField ? xField.toLowerCase() : 'product';
      labelText   = title || 'Count';
    } else { return; }

    const cd = {
      labels,
      datasets: [{ label: labelText, data: values }],
      dimension: dimensionKey
    };

    const chartType  = selectChartType(cd);
    const isHorizontal = chartType === 'horizontal_bar';
    const isStacked    = chartType === 'stacked_bar';
    const PALETTE = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#f97316','#84cc16'];

    const datasets = cd.datasets.map((ds, i) => ({
      label: ds.label || '',
      data: ds.data || [],
      backgroundColor: PALETTE[i % PALETTE.length] + (isStacked ? 'cc' : 'dd'),
      borderColor: PALETTE[i % PALETTE.length],
      borderWidth: 1,
      borderRadius: isHorizontal ? 3 : 4,
      borderSkipped: false
    }));

    if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; }

    instanceRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels: cd.labels, datasets },
      options: {
        indexAxis: isHorizontal ? 'y' : 'x',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: datasets.length > 1, position: 'top', labels: { color: '#475569', font: { size: 12 }, boxWidth: 12, padding: 16 } },
          tooltip: {
            backgroundColor: '#1e293b', titleColor: '#f1f5f9', bodyColor: '#cbd5e1',
            borderColor: '#334155', borderWidth: 1, padding: 10,
            callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed[isHorizontal?'x':'y']}` }
          }
        },
        scales: {
          x: { stacked: isStacked, grid: { color: '#E2E8F0' }, ticks: { color: '#64748b', font: { size: 11 }, maxRotation: 35 } },
          y: { stacked: isStacked, grid: { color: '#E2E8F0' }, ticks: { color: '#64748b', font: { size: 11 } }, beginAtZero: true }
        },
        animation: { duration: 400 }
      }
    });

    return () => { if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; } };
  }, [data, chartData, title, xField]);

  const isEmpty = chartData ? (!chartData.data || chartData.data.length === 0) : (!data || data.length === 0);
  if (isEmpty) return React.createElement('div',{style:{padding:16,color:'var(--text-muted)',fontSize:13}},'No chart data');
  const total = (chartData ? chartData.data : data||[]).reduce((a,b)=>a+(b.value||0),0);

  return React.createElement('div',{className:'chart-container'},
    React.createElement('div',{style:{height:'280px',position:'relative'}},
      React.createElement('canvas',{ref:canvasRef})
    ),
    React.createElement('div',{className:'chart-caption'},`${total.toLocaleString()} records`)
  );
}

// ─── SVG Charts ───
function BarChart({data,title,xField}){
  if(!data||data.length===0)return React.createElement('div',{style:{padding:16,color:'var(--text-muted)',fontSize:13}},'No chart data');
  const items=data.slice(0,14);
  const max=Math.max(...items.map(d=>d.value),1);
  const barH=22,gap=4,labelW=170,barArea=310,padTop=40,padBot=20;
  const h=padTop+items.length*(barH+gap)+padBot;
  return React.createElement('div',{className:'chart-container'},
    React.createElement('svg',{viewBox:`0 0 520 ${h}`,width:'100%',style:{fontFamily:'var(--font-sans)'}},
      React.createElement('text',{x:260,y:16,textAnchor:'middle',fontSize:12,fontWeight:700,fill:'#0A2463'},title||''),
      xField&&React.createElement('text',{x:260,y:30,textAnchor:'middle',fontSize:10,fill:'var(--text-muted)'},`Grouped by ${xField}`),
      items.map((d,i)=>{
        const y=padTop+i*(barH+gap);
        const w=Math.max(2,(d.value/max)*barArea);
        const label=d.name.length>26?d.name.slice(0,26)+'…':d.name;
        return React.createElement('g',{key:i},
          React.createElement('text',{x:labelW-8,y:y+barH/2+4,textAnchor:'end',fontSize:11,fill:'var(--text-primary)'},label),
          React.createElement('rect',{x:labelW,y:y,width:w,height:barH,rx:3,fill:CHART_COLORS[i%CHART_COLORS.length]}),
          React.createElement('text',{x:labelW+w+6,y:y+barH/2+4,fontSize:11,fontFamily:'var(--font-mono)',fill:'var(--text-secondary)'},d.value.toLocaleString())
        );
      })
    ),
    React.createElement('div',{className:'chart-caption'},`${data.reduce((a,b)=>a+b.value,0).toLocaleString()} records`)
  );
}

function PieChart({data,title,xField}){
  if(!data||data.length===0)return React.createElement('div',{style:{padding:16,color:'var(--text-muted)',fontSize:13}},'No chart data');
  const items=data.slice(0,9);
  const total=items.reduce((a,b)=>a+b.value,0)||1;
  const cx=110,cy=120,r=88,hole=36;
  let cumAngle=-Math.PI/2;
  const slices=items.map((d,i)=>{
    const angle=(d.value/total)*2*Math.PI;
    const startAngle=cumAngle;
    cumAngle+=angle;
    const endAngle=cumAngle;
    const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    const hx1=cx+hole*Math.cos(endAngle),hy1=cy+hole*Math.sin(endAngle);
    const hx2=cx+hole*Math.cos(startAngle),hy2=cy+hole*Math.sin(startAngle);
    const large=angle>Math.PI?1:0;
    const path=`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${hx1},${hy1} A${hole},${hole} 0 ${large} 0 ${hx2},${hy2} Z`;
    return React.createElement('path',{key:i,d:path,fill:CHART_COLORS[i%CHART_COLORS.length],stroke:'#fff',strokeWidth:2.5});
  });
  return React.createElement('div',{className:'chart-container'},
    React.createElement('svg',{viewBox:'0 0 520 250',width:'100%',style:{fontFamily:'var(--font-sans)'}},
      React.createElement('text',{x:260,y:16,textAnchor:'middle',fontSize:12,fontWeight:700,fill:'#0A2463'},title||''),
      ...slices,
      React.createElement('circle',{cx,cy,r:hole,fill:'#fff'}),
      React.createElement('text',{x:cx,y:cy-4,textAnchor:'middle',fontSize:16,fontWeight:700,fill:'var(--c-navy-800)',fontFamily:'var(--font-mono)'},total.toLocaleString()),
      React.createElement('text',{x:cx,y:cy+12,textAnchor:'middle',fontSize:9,fill:'var(--text-muted)'},'records'),
      items.map((d,i)=>{
        const ly=50+i*24;
        const pct=((d.value/total)*100).toFixed(1);
        const nm=d.name.length>22?d.name.slice(0,22)+'…':d.name;
        return React.createElement('g',{key:'l'+i},
          React.createElement('rect',{x:235,y:ly-6,width:12,height:12,rx:2,fill:CHART_COLORS[i%CHART_COLORS.length]}),
          React.createElement('text',{x:253,y:ly+4,fontSize:11,fill:'var(--text-primary)'},`${nm} (${pct}%)`)
        );
      })
    ),
    xField&&React.createElement('div',{className:'chart-caption'},`Grouped by ${xField}`)
  );
}

function LineChart({data,title,xField}){
  if(!data||data.length===0)return React.createElement('div',{style:{padding:16,color:'var(--text-muted)',fontSize:13}},'No chart data');
  const padT=32,padR=24,padB=54,padL=54,W=520,H=220;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const max=Math.max(...data.map(d=>d.value),1);
  const points=data.map((d,i)=>({
    x:padL+(data.length>1?i/(data.length-1):0.5)*plotW,
    y:padT+plotH-(d.value/max)*plotH,
    ...d
  }));
  const linePath=points.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const areaPath=linePath+` L${points[points.length-1].x},${padT+plotH} L${points[0].x},${padT+plotH} Z`;
  const gridLines=[];
  for(let i=0;i<=4;i++){
    const y=padT+plotH*(1-i/4);
    const val=Math.round(max*i/4);
    gridLines.push(React.createElement('line',{key:'g'+i,x1:padL,y1:y,x2:W-padR,y2:y,stroke:'#F1F5F9',strokeWidth:1}));
    gridLines.push(React.createElement('text',{key:'gl'+i,x:padL-8,y:y+4,textAnchor:'end',fontSize:10,fontFamily:'var(--font-mono)',fill:'var(--text-muted)'},val));
  }
  const step=Math.ceil(data.length/8);
  const xLabels=data.filter((_,i)=>i%step===0||i===data.length-1).map((d,idx)=>{
    const i=data.indexOf(d);
    const x=padL+(data.length>1?i/(data.length-1):0.5)*plotW;
    return React.createElement('text',{key:'xl'+idx,x,y:H-padB+18,textAnchor:'end',fontSize:10,fill:'var(--text-muted)',transform:`rotate(-40,${x},${H-padB+18})`},d.name.length>12?d.name.slice(0,12)+'…':d.name);
  });
  return React.createElement('div',{className:'chart-container'},
    React.createElement('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',style:{fontFamily:'var(--font-sans)'}},
      React.createElement('text',{x:W/2,y:16,textAnchor:'middle',fontSize:12,fontWeight:700,fill:'#0A2463'},title||''),
      ...gridLines,
      React.createElement('path',{d:areaPath,fill:'rgba(10,36,99,0.07)'}),
      React.createElement('path',{d:linePath,fill:'none',stroke:'#0A2463',strokeWidth:2.5}),
      points.map((p,i)=>React.createElement('circle',{key:'p'+i,cx:p.x,cy:p.y,r:3.5,fill:'#0A2463'})),
      ...xLabels
    ),
    xField&&React.createElement('div',{className:'chart-caption'},`Grouped by ${xField}`)
  );
}

// ─── Response Renderer ───
function ResponseRenderer({text,onSuggestClick}){
  if(!text)return null;
  const sections=[];
  const lines=text.split('\n');
  let current=null;
  lines.forEach(line=>{
    const trimmed=line.trim();
    if(/^\*\*FINDING:\*\*/i.test(trimmed)){
      current={type:'finding',text:trimmed.replace(/^\*\*FINDING:\*\*\s*/i,'')};sections.push(current);
    }else if(/^\*\*DATA SNAPSHOT:\*\*/i.test(trimmed)){
      current={type:'data',text:''};sections.push(current);
    }else if(/^\*\*MARKET ACCESS CONTEXT:\*\*/i.test(trimmed)){
      current={type:'context',text:trimmed.replace(/^\*\*MARKET ACCESS CONTEXT:\*\*\s*/i,'')};sections.push(current);
    }else if(/^\*\*SIGNAL:\*\*/i.test(trimmed)){
      current={type:'signal',text:trimmed.replace(/^\*\*SIGNAL:\*\*\s*/i,'')};sections.push(current);
    }else if(/^\*\*SUGGESTED NEXT QUERY:\*\*/i.test(trimmed)){
      current={type:'suggest',text:trimmed.replace(/^\*\*SUGGESTED NEXT QUERY:\*\*\s*/i,'')};sections.push(current);
    }else if(/^\*\*WHY:\*\*/i.test(trimmed)){
      current={type:'context',text:trimmed.replace(/^\*\*WHY:\*\*\s*/i,'')};sections.push(current);
    }else if(/^\*\*AVAILABLE OPTIONS:\*\*/i.test(trimmed)){
      current={type:'data',text:trimmed.replace(/^\*\*AVAILABLE OPTIONS:\*\*\s*/i,'')};sections.push(current);
    }else if(current){
      current.text+=(current.text?'\n':'')+trimmed;
    }else if(trimmed){
      sections.push({type:'text',text:trimmed});
    }
  });
  if(sections.length===0)return React.createElement('div',{className:'msg-section'},text);
  return React.createElement('div',null,sections.map((s,i)=>{
    if(s.type==='finding')return React.createElement('div',{key:i,className:'msg-section msg-finding'},s.text);
    if(s.type==='data')return React.createElement('div',{key:i,className:'msg-section msg-data'},s.text);
    if(s.type==='context')return React.createElement('div',{key:i,className:'msg-section msg-context'},s.text);
    if(s.type==='signal')return React.createElement('div',{key:i,className:'msg-section msg-signal'},s.text);
    if(s.type==='suggest')return React.createElement('span',{key:i,className:'msg-suggest',onClick:()=>onSuggestClick&&onSuggestClick(s.text)},`💡 ${s.text}`);
    return React.createElement('div',{key:i,className:'msg-section'},s.text);
  }));
}

function ConfidenceIndicator({confidence}){
  if(!confidence)return null;
  const s=confidence.score;
  let cls='high',icon='●',label='High confidence';
  if(s<0.7){cls='low';icon='○';label='Low confidence';}
  else if(s<0.85){cls='medium';icon='◑';label='Medium confidence';}
  const tip=confidence.warnings&&confidence.warnings.length>0?' — '+confidence.warnings.join('; '):'';
  return React.createElement('div',{className:`confidence-dot ${cls}`,title:label+tip},`${icon} ${label} (${s})`);
}

function ThinkingIndicator({stage}){
  const labels=['Understanding...','Filtering data...','Generating insight...'];

// ─── Upload Modal ───
function UploadModal({state,dispatch}){
  const fileRef=useRef();
  const [drag,setDrag]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [error,setError]=useState('');

  const handleFile=async(file)=>{
    setUploading(true);setError('');
    try{
      const fd=new FormData();fd.append('file',file);
      const res=await fetch('/api/upload',{method:'POST',headers:{'x-access-key':sessionStorage.getItem('maip_access_key')||''},body:fd});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||'Upload failed');}
      const data=await res.json();
      dispatch({type:'SET',payload:{
        uploadParsed:data,uploadSchema:data.schema,uploadStep:2,uploadFile:file
      }});
    }catch(e){setError(e.message);}
    setUploading(false);
  };

  const handleDrop=e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
  const confirm=()=>{
    const d=state.uploadParsed;
    dispatch({type:'SET',payload:{
      sessionId:d.session_id,filename:d.filename,rowCount:d.row_count,
      schema:d.schema,profile:d.profile,dataQuality:d.dataQuality,
      showUpload:false,uploadStep:1,activeModule:'dashboard',
      messages:[],results:null,chart:null,stats:null,page:1
    }});
  };

  const step=state.uploadStep;
  const d=state.uploadParsed;
  const s=state.uploadSchema;

  return React.createElement('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)dispatch({type:'RESET_UPLOAD'})},onKeyDown:e=>{if(e.key==='Escape')dispatch({type:'RESET_UPLOAD'})}},
    React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-header'},
        React.createElement('h2',null,'Load Dataset'),
        React.createElement('button',{className:'btn-icon',onClick:()=>dispatch({type:'RESET_UPLOAD'})},'✕')
      ),
      React.createElement('div',{className:'modal-body'},
        React.createElement('div',{className:'wizard-steps'},
          [1,2,3].map(n=>React.createElement('div',{key:n,className:`wizard-step ${step===n?'active':step>n?'done':''}`},
            React.createElement('div',{className:'wizard-num'},step>n?'✓':n),
            React.createElement('span',null,['File','Review','Confirm'][n-1])
          ))
        ),
        step===1&&React.createElement('div',null,
          React.createElement('div',{
            className:`upload-zone ${drag?'dragover':''}`,
            onDragOver:e=>{e.preventDefault();setDrag(true)},
            onDragLeave:()=>setDrag(false),
            onDrop:handleDrop,
            onClick:()=>fileRef.current.click()
          },
            React.createElement('div',{className:'upload-icon'},'📁'),
            React.createElement('p',{style:{fontWeight:500}},'Drop your file here or click to browse'),
            React.createElement('p',{style:{fontSize:12,color:'var(--text-muted)'}},'Supports .xlsx, .xls, .csv'),
            uploading&&React.createElement('div',{className:'spinner',style:{margin:'8px auto'}})
          ),
          React.createElement('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',hidden:true,onChange:e=>{if(e.target.files[0])handleFile(e.target.files[0])}}),
          error&&React.createElement('p',{style:{color:'var(--c-red-500)',marginTop:8,fontSize:13}},error)
        ),
        step===2&&d&&React.createElement('div',null,
          React.createElement('div',{style:{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16}},
            React.createElement('span',{className:'stat-chip'},`📊 ${d.row_count.toLocaleString()} rows`),
            React.createElement('span',{className:'stat-chip'},`📋 ${s.columns.length} columns`),
            React.createElement('span',{className:'stat-chip'},`🎯 ${Object.keys(s.roles).length} roles detected`)
          ),
          React.createElement('h4',{style:{marginBottom:8}},'Schema Detection'),
          React.createElement('table',{className:'schema-table'},
            React.createElement('thead',null,React.createElement('tr',null,
              React.createElement('th',null,'Role'),React.createElement('th',null,'Detected Column'),React.createElement('th',null,'Confidence')
            )),
            React.createElement('tbody',null,Object.entries(s.roles).map(([role,col])=>
              React.createElement('tr',{key:role},
                React.createElement('td',null,role),
                React.createElement('td',null,col||'—'),
                React.createElement('td',null,s.confidence[role]?`${(s.confidence[role]*100).toFixed(0)}%`:'—')
              )
            ))
          ),
          React.createElement('h4',{style:{marginTop:16,marginBottom:8}},'Data Quality'),
          React.createElement('div',{className:'quality-gauge'},
            React.createElement('div',{className:'quality-bar'},
              React.createElement('div',{className:'quality-fill',style:{width:`${d.dataQuality.score}%`,background:d.dataQuality.score>=80?'var(--c-green-500)':d.dataQuality.score>=60?'var(--c-amber-500)':'var(--c-red-500)'}})
            ),
            React.createElement('span',{style:{fontWeight:700,fontFamily:'var(--font-mono)'}},`${d.dataQuality.score}/100`)
          ),

            s.roles.STATUS&&React.createElement('li',null,'✅ Status tracking'),
            s.roles.PRODUCT&&React.createElement('li',null,'✅ Product filtering'),
            s.roles.COUNTRY&&React.createElement('li',null,'✅ Geographic analysis'),
            s.roles.PRODUCT&&s.roles.COUNTRY&&React.createElement('li',null,'✅ Market intelligence modules'),
            s.roles.PERIOD&&React.createElement('li',null,'✅ Timeline analysis'),
            !s.roles.PRODUCT&&React.createElement('li',null,'⚠️ No Product column detected'),
            !s.roles.STATUS&&React.createElement('li',null,'⚠️ No Status column detected')
          ),
          d.dataQuality.score<70&&React.createElement('p',{style:{color:'var(--c-amber-500)',fontSize:13,marginTop:8}},'⚠️ Data quality score is below 70 — some analyses may be affected.'),
          React.createElement('div',{className:'modal-footer',style:{padding:'16px 0 0',border:'none'}},
            React.createElement('button',{className:'btn btn-secondary',onClick:()=>dispatch({type:'SET',payload:{uploadStep:2}})},'← Back'),
            React.createElement('button',{className:'btn btn-primary',onClick:confirm},'🚀 Load into Agent')
          )
        )
      )
    )
  );
}

// ─── Feedback Modal ───
function FeedbackModal({message,onClose}){
  const [issueType,setIssueType]=React.useState('wrong_result');
  const [detail,setDetail]=React.useState('');
  const [status,setStatus]=React.useState('idle');
  // status: idle | sending | done | error
  const ISSUE_TYPES=[
    {value:'wrong_result', label:'Wrong result — filter returned incorrect data'},
    {value:'chart_broken', label:'Chart broken — visualisation did not render'},
    {value:'wrong_count',  label:'Wrong count — numbers in response are incorrect'},
    {value:'slow',         label:'Too slow — response took too long'},
    {value:'suggestion',   label:'Suggestion — feature request or improvement'},
    {value:'other',        label:'Other'},
  ];
  async function submit(){
    setStatus('sending');
    try{
      const res=await fetch('/api/feedback',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-access-key':sessionStorage.getItem('maip_access_key')||''},
        body:JSON.stringify({
          session_id:message?.sessionId||null,
          query_text:message?.queryText||null,
          issue_type:issueType,
          detail:detail.trim()||null,
        }),
      });
      if(!res.ok)throw new Error(await res.text());
      setStatus('done');
      setTimeout(onClose,1800);
    }catch(e){setStatus('error');}
  }
  return React.createElement('div',{
    onClick:e=>e.target===e.currentTarget&&onClose(),
    style:{position:'fixed',inset:0,background:'rgba(10,22,40,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60,padding:'20px'},
  },
    React.createElement('div',{style:{background:'white',borderRadius:'16px',maxWidth:'480px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.3)',overflow:'hidden'}},
      React.createElement('div',{style:{background:'linear-gradient(135deg,#0A1628,#0A2463)',padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        React.createElement('div',null,
          React.createElement('div',{style:{color:'white',fontWeight:700,fontSize:15}},'🚩 Report an Issue'),
          React.createElement('div',{style:{color:'#93C5FD',fontSize:12,marginTop:2}},'Help us improve MAIP')
        ),
        React.createElement('button',{onClick:onClose,style:{background:'rgba(255,255,255,.15)',border:'none',borderRadius:'8px',color:'white',padding:'6px 12px',cursor:'pointer',fontSize:13}},'✕')
      ),
      React.createElement('div',{style:{padding:'24px'}},
        status==='done'
          ? React.createElement('div',{style:{textAlign:'center',padding:'24px',color:'#16A34A',fontSize:15,fontWeight:600}},'✅ Feedback received — thank you!')
          : React.createElement(React.Fragment,null,
              React.createElement('div',{style:{marginBottom:16}},
                React.createElement('label',{style:{display:'block',fontSize:12,fontWeight:700,color:'#0A2463',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}},'Issue type'),
                React.createElement('select',{value:issueType,onChange:e=>setIssueType(e.target.value),style:{width:'100%',border:'1.5px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',fontSize:13,fontFamily:'inherit',background:'white',cursor:'pointer'}},
                  ISSUE_TYPES.map(o=>React.createElement('option',{key:o.value,value:o.value},o.label))
                )
              ),
              React.createElement('div',{style:{marginBottom:16}},
                React.createElement('label',{style:{display:'block',fontSize:12,fontWeight:700,color:'#0A2463',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}},'Details (optional)'),
                React.createElement('textarea',{rows:3,value:detail,onChange:e=>setDetail(e.target.value),placeholder:'Describe what happened, what you expected, or your suggestion...',style:{width:'100%',border:'1.5px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',fontSize:13,fontFamily:'inherit',resize:'vertical',minHeight:'72px',outline:'none'}})
              ),
              message&&message.queryText&&React.createElement('div',{style:{background:'#F8FAFC',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'10px 12px',marginBottom:16}},
                React.createElement('div',{style:{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}},'Related query'),
                React.createElement('div',{style:{fontSize:12,color:'#374151',fontFamily:'IBM Plex Mono, Courier New, monospace'}},

// ─── Token Chip ───
function TokenChip({stats}){
  if(!stats)return React.createElement('div',{className:'token-chip token-chip--loading'},
    React.createElement('span',{className:'tc-dot',style:{background:'#334155'}}),
    React.createElement('span',{style:{fontSize:'11px',color:'#64748b'}},'Loading usage…')
  );
  const pct    = stats.pct_used??0;
  const status = stats.status??'healthy';
  const used   = stats.tokens_used_today??0;
  const limit  = stats.daily_token_limit??0;
  const calls  = (stats.haiku_calls_today??0)+(stats.sonnet_calls_today??0);
  const dotColor={healthy:'#10b981',moderate:'#f59e0b',critical:'#ef4444'}[status]||'#10b981';
  const usedK  = used>=1000?(used/1000).toFixed(1)+'k':String(used);
  const limitK = limit>=1000?(limit/1000).toFixed(0)+'k':String(limit);
  return React.createElement('div',{className:'token-chip',title:`AI tokens today: ${used.toLocaleString()} / ${limit.toLocaleString()} (${pct}%)`},
    React.createElement('span',{className:'tc-dot',style:{background:dotColor}}),
    React.createElement('span',{className:'tc-label'},`${usedK} / ${limitK}`),
    React.createElement('div',{className:'tc-track'},
      React.createElement('div',{className:'tc-fill',style:{width:`${Math.min(pct,100)}%`,background:dotColor}})
    ),
    React.createElement('span',{className:'tc-calls'},`Calls ${calls}`)
  );
}

    dispatch({type:'ADD_MSG',payload:{role:'user',text:query}});
    dispatch({type:'SET',payload:{loading:true,confidence:null,suggestions:[]}});
    setThinkStage(0);

function getRecommendations(currentModuleId, resultText, ranModuleIds) {
  if (!resultText || resultText.length < 100) return [];
  if (!currentModuleId) return [];
  const alreadyRan = new Set(ranModuleIds || []);
  const t = resultText.toLowerCase();
  const recs = [];
  const rules = [
    { from:3, detect:['price','pricing','cost','annual cost','affordab','cheaper','expensive','budget'], suggest:8, reason:'Pricing dynamics detected — assess IRP cascade risk' },
    { from:3, detect:['not reimbursed','restricted','limited access','no reimbursement','planned','hta','formulary'], suggest:5, reason:'Access gap detected — review HTA submission pathway' },
    { from:5, detect:['delay','pending','under review','months','years','timeline','slow','backlog','queue'], suggest:4, reason:'HTA delays flagged — map timeline to next milestone' },
    { from:5, detect:['budget','cost-effective','economic','qaly','budget impact','payer','insurance','heor'], suggest:11, reason:'Budget evidence required — analyse payer landscape' },
    { from:8, detect:['reference','basket','cascade','lower price','price erosion','below basket','irp'], suggest:3, reason:'Reference pricing risk — benchmark competitive positioning' },
    { from:8, detect:['launch','sequence','sequencing','market entry','delay launch','launch order'], suggest:4, reason:'Launch sequence risk — align timeline intelligence' },
    { from:4, detect:['evidence','data gap','clinical data','real-world','rwe','lacking evidence','dossier'], suggest:9, reason:'Evidence gaps detected — assess submission readiness' },
    { from:4, detect:['submission','dossier','file','apply','application','hta body','hta process'], suggest:5, reason:'Submission pathway active — review HTA requirements' },
    { from:11, detect:['hospital','formulary','channel','tender','procurement','oncology centre','cancer centre'], suggest:10, reason:'Channel dynamics identified — analyse hospital access' },
    { from:9, detect:['comparator','competitor','head-to-head','versus','alternative therapy','standard of care'], suggest:3, reason:'Comparator gap found — assess competitive positioning' },
  ];
  for (const rule of rules) {
    if (rule.from !== currentModuleId) continue;
    if (recs.length >= 2) break;
    if (recs.some(r => r.moduleId === rule.suggest)) continue;
    if (rule.detect.some(kw => t.includes(kw)) && !alreadyRan.has(rule.suggest)) {
      recs.push({ moduleId: rule.suggest, reason: rule.reason });
    }
  }
  return recs.slice(0, 2);
}

        .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
        .replace(/[\u{2600}-\u{27BF}]/gu, '')
        .replace(/\s{2,}/g, ' ')
        .trim();

      doc.setFontSize(9);

        doc.setFillColor(15, 17, 23);
        doc.rect(0, 0, W, H, 'F');

      if (y + blockH > H - 30) {
        doc.addPage();
        doc.setFillColor(15, 17, 23);
        doc.rect(0, 0, W, H, 'F');
        y = 20;
      }
      doc.setFillColor(20, 28, 65);
      doc.roundedRect(margin, y, W - margin * 2, blockH, 3, 3, 'F');
      doc.setFillColor(79, 110, 247);
      doc.roundedRect(margin, y, 3, blockH, 1, 1, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(79, 110, 247);
      doc.text('LEADERSHIP SIGNAL', margin + 8, y + 6);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(238, 240, 250);
      doc.text(sigLines, margin + 8, y + 12);
      y += blockH + 12;

    // Footer
    doc.setFillColor(26, 29, 39);
    doc.rect(0, H - 16, W, 16, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);

    doc.text(
      'Generated by MAIP  \u00b7  lrmaip.com  \u00b7  Confidential',
      W / 2, H - 7, { align: 'center' }
    );
    function safeSegment(s) {
      return (s || 'unknown')
        .replace(/[^a-zA-Z0-9_-]/g, '_')
        .replace(/_+/g, '_')
        .substring(0, 30);
    }
    const filename = [
      'MAIP',
      safeSegment(country),
      safeSegment(product),
      safeSegment(moduleTitle),
      dateStr.replace(/\s/g, '')
    ].join('_') + '.pdf';
    doc.save(filename);
  } catch (err) {

    console.error('exportBriefingPDF error:', err);

function IndicationLookup({product,sessionId,currentValue,onSelect,cache,onCache}){
  const [open,    setOpen]    = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [error,   setError]   = React.useState(null);
  const [filter,  setFilter]  = React.useState('All');
  async function fetchIndications(){
    if(!product||!sessionId)return;
    if(cache[product]){
      setResults(cache[product]);
      setOpen(true);
      return;
    }
    setLoading(true);setError(null);setOpen(true);
    try{
      const res=await fetch(
        `/api/indications?product=${encodeURIComponent(product)}&session_id=${encodeURIComponent(sessionId)}`,
        {headers:{'x-access-key':sessionStorage.getItem('maip_access_key')||''}}
      );
      const data=await res.json();
      if(!res.ok){
        setError(data.detail||`Error ${res.status}`);setResults([]);
      }else if(data.success){
        const inds=data.indications||[];
        setResults(inds);
        onCache(prev=>({...prev,[product]:inds}));
      }else{
        setError('Could not retrieve indications.');setResults([]);
      }
    }catch(e){
      setError('Connection error: '+e.message);setResults([]);
    }finally{
      setLoading(false);
    }
  }
  React.useEffect(()=>{setOpen(false);setFilter('All');},[product]);
  const filtered=filter==='All'?results:results.filter(r=>r.source===filter);
  const hasDataset=results.some(r=>r.source==='Dataset');
  const hasAI=results.some(r=>r.source==='FDA/EMA');
  return React.createElement('div',{className:'ind-lookup-wrap'},
    React.createElement('button',{
      className:'ind-lookup-btn'+(loading?' ind-lookup-btn-loading':''),
      onClick:fetchIndications,
      disabled:loading||!product,
      title:product?`Fetch approved indications for ${product}`:'Select a product first'
    },loading?'\u23f3':'\u2728'),
    open&&React.createElement('div',{className:'ind-dropdown'},
      React.createElement('div',{className:'ind-dropdown-header'},
        React.createElement('span',{className:'ind-dropdown-title'},product+' Indications'),
        React.createElement('button',{className:'ind-dropdown-close',onClick:()=>setOpen(false)},'\u2715')
      ),
      hasDataset&&hasAI&&React.createElement('div',{className:'ind-filter-tabs'},
        ['All','Dataset','FDA/EMA'].map(tab=>
          React.createElement('button',{
            key:tab,
            className:'ind-filter-tab'+(filter===tab?' ind-filter-tab-active':''),
            onClick:()=>setFilter(tab)
          },tab)
        )
      ),
      loading&&React.createElement('div',{className:'ind-dropdown-loading'},'Fetching verified indications\u2026'),
      error&&React.createElement('div',{className:'ind-dropdown-error'},error),
      !loading&&!error&&filtered.length===0&&React.createElement('div',{className:'ind-dropdown-empty'},'No indications found for this product.'),
      !loading&&!error&&filtered.length>0&&React.createElement('ul',{className:'ind-list'},
        filtered.map((item,i)=>
          React.createElement('li',{
            key:i,
            className:'ind-item'+(currentValue&&currentValue.toLowerCase().trim()===item.label.toLowerCase().trim()?' ind-item-selected':''),
            onClick:()=>{onSelect(item.label);setOpen(false);}
          },
            React.createElement('span',{className:'ind-item-label'},item.label),
            React.createElement('span',{className:'ind-item-source ind-source-'+item.source.replace('/','-').toLowerCase()},item.source)
          )
        )
      ),
      !loading&&results.length>0&&React.createElement('div',{className:'ind-dropdown-footer'},
        `${results.length} indications found`+
        (hasDataset?` \u00b7 ${results.filter(r=>r.source==='Dataset').length} in your dataset`:'')+
        (hasDataset&&hasAI?' \u00b7 ':'')+
        (hasAI?`${results.filter(r=>r.source==='FDA/EMA').length} from FDA/EMA`:'')
      )
    )
  );
}
