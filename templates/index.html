        context:{product:product||null,country:country||null,indication:indication||null},
        model:modelMap[state.m2Model]||undefined
      })});
      dispatch({type:'ADD_RESEARCH',payload:{...res,subtype,product,country,indication,timestamp:new Date().toLocaleTimeString()}});
      onStatsRefresh&&onStatsRefresh();
    }catch(e){
      // Surface structured error in banner; do not create a raw error card
      setResearchError({user_message:e.message,retry_suggested:e.message!=='Request failed'&&!e.message.includes('limit')});
    }
    dispatch({type:'SET',payload:{researchLoading:false}});
  };

  const pv=state.profile?.productValues||[];
  const cv=state.profile?.countryValues||[];
  const confColors={High:'var(--c-green-500)',Medium:'var(--c-amber-500)',Low:'var(--c-red-500)'};

  return React.createElement('div',{className:'mi-layout'},
    React.createElement('div',{className:'mi-sidebar'},
      React.createElement('h3',{style:{marginBottom:16}},'Research Module'),
      React.createElement('label',{className:'mi-label'},'Module'),
      React.createElement('select',{className:'mi-select',value:subtype,onChange:e=>setSubtype(e.target.value)},
        subtypes.map(s=>React.createElement('option',{key:s.id,value:s.id},s.label))
      ),
      React.createElement('label',{className:'mi-label'},'Product'),
      React.createElement('select',{className:'mi-select',value:product,onChange:e=>setProduct(e.target.value)},
        React.createElement('option',{value:''},'— Select —'),
        pv.map(p=>React.createElement('option',{key:p,value:p},p))
      ),
      React.createElement('label',{className:'mi-label'},'Country'),
      React.createElement('select',{className:'mi-select',value:country,onChange:e=>setCountry(e.target.value)},
        React.createElement('option',{value:''},'— Select —'),
        cv.map(c=>React.createElement('option',{key:c,value:c},c))
      ),
      React.createElement('label',{className:'mi-label'},'Indication'),
      React.createElement('div',{className:'ind-input-wrap'},
        React.createElement('input',{className:'mi-select ind-input-padded',placeholder:'Type or click \u2728 to fetch',value:indication,onChange:e=>setIndication(e.target.value)}),
        React.createElement(IndicationLookup,{product,sessionId:state.sessionId,currentValue:indication,onSelect:value=>setIndication(value),cache:indicationCache,onCache:setIndicationCache})
      ),
      React.createElement('button',{className:'btn btn-primary',style:{width:'100%',marginTop:16,justifyContent:'center'},onClick:runResearch,disabled:state.researchLoading},
        state.researchLoading?React.createElement('span',{className:'spinner'}):null,
        state.researchLoading?' Researching...':'\uD83D\uDD0D Run Research'
      ),
      React.createElement(CoveragePanel,{
        product,country,
        sessionId:state.sessionId,
        fdaIndications:(indicationCache[product]||[]).filter(i=>i.source==='FDA/EMA').map(i=>i.label)
      })
    ),
    React.createElement('div',{className:'mi-content'},
      researchError&&(()=>{
        const{message,showRetry}=getResearchErrorDisplay(researchError);
        return React.createElement('div',{className:'research-error-banner'},
          React.createElement('span',{className:'error-icon'},'⚠️'),
          React.createElement('span',{className:'error-text'},message),
          showRetry&&React.createElement('button',{className:'retry-btn',onClick:()=>{setResearchError(null);runResearch();}},'Retry')
        );
      })(),
      state.researchCards.length===0&&!researchError&&React.createElement('div',{style:{textAlign:'center',padding:60,color:'var(--text-muted)'}},
        React.createElement('div',{style:{fontSize:48,marginBottom:16}},'🔬'),
        React.createElement('h3',null,'Market Intelligence'),
        React.createElement('p',{style:{fontSize:13}},'Select a module and context, then run research to generate intelligence cards.')
      ),
      state.researchCards.map((card,i)=>{
        const moduleId=SUBTYPE_TO_MODULE_ID[card.subtype]||null;
        const ranModuleIds=(state.researchCards||[]).map(c=>SUBTYPE_TO_MODULE_ID[c.subtype]||null).filter(Boolean);
        const cardRecs=getRecommendations(moduleId,card.result_text,ranModuleIds);
        function handleRecommendationSelect(recModuleId){
          const subtypeStr=MODULE_ID_TO_SUBTYPE[recModuleId];
          if(subtypeStr)setSubtype(subtypeStr);
        }
        return React.createElement('div',{key:i},
        LEADERSHIP_MODULE_IDS.has(moduleId)&&card.result_text&&card.result_text.length>100&&React.createElement(LeadershipSummaryCard,{key:[moduleId,card.country||'',card.product||'',card.indication||''].join('|'),moduleId,country:card.country||'',product:card.product||'',indication:card.indication||'',intelligenceText:card.result_text}),
        React.createElement('div',{className:'intel-card',style:{borderTop:`3px solid ${confColors[card.confidence]||'var(--border)'}`}},
        React.createElement('div',{className:'intel-card-header'},
          React.createElement('span',{className:'intel-badge',style:{background:'var(--c-navy-800)',color:'#fff'}},card.subtype),
          card.product&&React.createElement('span',{className:'intel-badge',style:{background:'var(--bg-input)'}},card.product),
          card.country&&React.createElement('span',{className:'intel-badge',style:{background:'var(--bg-input)'}},card.country),
          React.createElement('span',{className:'intel-badge',style:{background:confColors[card.confidence]+'20',color:confColors[card.confidence]}},`● ${card.confidence}`),
          React.createElement('span',{style:{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}},card.timestamp),
          card.cached&&React.createElement('span',{className:'intel-badge',style:{background:'var(--bg-input)',color:'var(--text-muted)'}},'Cached')
        ),
        React.createElement('div',{className:'intel-card-body'},card.result_text),
        React.createElement('div',{className:'intel-card-footer'},
          React.createElement('button',{className:'btn btn-sm btn-secondary',onClick:()=>{navigator.clipboard.writeText(card.result_text)}},'📋 Copy'),
          React.createElement('button',{className:'btn btn-sm btn-secondary',onClick:()=>dispatch({type:'REMOVE_RESEARCH',index:i})},'🗑 Remove')
        )
      ),
        React.createElement(RecommendationBar,{recommendations:cardRecs,onSelect:handleRecommendationSelect})
      )
    })
    )
  );
}

// ─── Export Module ───
function ExportModule({state}){
  const [exporting,setExporting]=useState(false);
  const exportExcel=async()=>{
    setExporting(true);
    try{
      const res=await fetch('/api/export/excel',{method:'POST',headers:{'Content-Type':'application/json','x-access-key':sessionStorage.getItem('maip_access_key')||''},body:JSON.stringify({session_id:state.sessionId})});
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`${state.filename||'export'}_export.xlsx`;a.click();URL.revokeObjectURL(url);
    }catch(e){alert('Export failed: '+e.message);}
    setExporting(false);
  };

  return React.createElement('div',{style:{padding:40,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48,marginBottom:16}},'📥'),
    React.createElement('h2',null,'Export Data'),
    React.createElement('p',{style:{color:'var(--text-secondary)',marginBottom:24}},'Download your dataset and analysis results'),
    React.createElement('button',{className:'btn btn-primary',onClick:exportExcel,disabled:exporting},
      exporting?'Exporting...':'📊 Export to Excel'
    )
  );
}

// ─── Access Gate ───
function AccessGate({onUnlocked}){
  const [key,setKey]=React.useState('');
  const [error,setError]=React.useState('');
  const [checking,setChecking]=React.useState(false);
  const [showKey,setShowKey]=React.useState(false);
  React.useEffect(()=>{
    const stored=sessionStorage.getItem('maip_access_key');
    if(stored)onUnlocked(stored);
  },[]);
  async function handleSubmit(){
    if(!key.trim())return;
    setChecking(true);setError('');
    try{
      const res=await fetch('/api/stats',{headers:{'x-access-key':key.trim()}});
      if(res.ok){
        sessionStorage.setItem('maip_access_key',key.trim());
        onUnlocked(key.trim());
      }else{
        setError('Access denied. Check your key and try again.');
      }
    }catch{
      setError('Connection error. Please retry.');
    }finally{
      setChecking(false);
    }
  }
  return React.createElement('div',{className:'access-gate'},
    React.createElement('div',{className:'access-gate-card'},
      React.createElement('h2',null,'MAIP Access'),
      React.createElement('p',null,'Enter your access key to continue.'),
      React.createElement('div',{style:{position:'relative',marginBottom:'16px'}},
        React.createElement('input',{
          type:showKey?'text':'password',placeholder:'Enter access key',value:key,
          onChange:e=>setKey(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&handleSubmit(),
          className:'access-gate-input',
          style:{marginBottom:'0',paddingRight:'44px'}
        }),
        React.createElement('button',{
          type:'button',onClick:()=>setShowKey(v=>!v),
          className:'access-gate-toggle',tabIndex:-1
        },showKey?'🙈':'👁')
      ),
      React.createElement('button',{
        onClick:handleSubmit,disabled:checking,className:'access-gate-btn'
      },checking?'Checking…':'Unlock'),
      error&&React.createElement('p',{className:'access-gate-error'},error)
    )
  );
}

// ─── Gap Market Priority Score ───
const TIER_CONFIG = {
  Critical: { color: '#f87171', bg: 'rgba(248,113,113,0.1)',
               border: 'rgba(248,113,113,0.3)' },
  Defend:   { color: '#fb923c', bg: 'rgba(251,146,60,0.1)',
               border: 'rgba(251,146,60,0.3)' },
  Watch:    { color: '#fbbf24', bg: 'rgba(251,191,36,0.1)',
               border: 'rgba(251,191,36,0.3)' },
  Monitor:  { color: '#34d399', bg: 'rgba(52,211,153,0.1)',
               border: 'rgba(52,211,153,0.3)' },
};
function GapAnalysisView({ sessionId, onClose }) {
  const [data,    setData]    = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error,   setError]   = React.useState(null);
  const [filter,  setFilter]  = React.useState('All');
  React.useEffect(() => {
    async function load() {
      if (!sessionId) {
        setError('No dataset loaded. Please upload a file first.');
        setLoading(false);
        return;
      }
      try {
        const res = await fetch(
          `/api/gap-analysis?session_id=${sessionId}`, {
          headers: {
            'x-access-key': sessionStorage.getItem('maip_access_key') || ''
          }
        });
        const json = await res.json();
        if (json.success) setData(json);
        else setError(json.detail || 'Failed to load gap analysis.');
      } catch(e) {
        setError('Connection error. Please ensure a dataset is loaded.');
      } finally {
        setLoading(false);
      }
    }
    load();
  }, [sessionId]);
  const filtered = data
    ? (filter === 'All'
        ? data.markets
        : data.markets.filter(m => m.tier === filter))
    : [];
  return React.createElement('div', { className: 'gap-overlay' },
    React.createElement('div', { className: 'gap-panel' },
      // Header
      React.createElement('div', { className: 'gap-header' },
        React.createElement('div', { className: 'gap-header-left' },
          React.createElement('span', { className: 'gap-header-icon' }, '🎯'),
          React.createElement('div', null,
            React.createElement('h2', { className: 'gap-title' },
              'Gap Market Priority Score'),
            React.createElement('p', { className: 'gap-subtitle' },
              'Access gap severity ranked across all markets')
          )
        ),
        React.createElement('button', {
          className: 'gap-close', onClick: onClose
        }, '✕')
      ),
      // Summary tiles
      loading || !data ? null :
      React.createElement('div', { className: 'gap-tiles' },
        [
          ['Critical', data.critical, '#f87171'],
          ['Defend',   data.defend,   '#fb923c'],
          ['Watch',    data.watch,    '#fbbf24'],
          ['Monitor',  data.monitor,  '#34d399'],
        ].map(([tier, count, color]) =>
          React.createElement('div', {
            key: tier,
            className: 'gap-tile' + (filter === tier ? ' gap-tile-active' : ''),
            style: { borderColor: filter === tier ? color : 'rgba(255,255,255,0.08)' },
            onClick: () => setFilter(filter === tier ? 'All' : tier)
          },
            React.createElement('span', {
              className: 'gap-tile-count',
              style: { color }
            }, count),
            React.createElement('span', {
              className: 'gap-tile-label',
              style: { color }
            }, tier)
          )
        )
      ),
      // Loading / Error
      loading && React.createElement('div', { className: 'gap-loading' },
        'Computing gap scores across all markets\u2026'),
      error && React.createElement('div', { className: 'gap-error' }, error),
      // Table
      !loading && !error && data &&
      React.createElement('div', { className: 'gap-table-wrap' },
        React.createElement('table', { className: 'gap-table' },
          React.createElement('thead', null,
            React.createElement('tr', null,
              ['#', 'Market', 'Region', 'Tier', 'Score',
               'Gap %', 'Indications', 'Action'].map(h =>
                React.createElement('th', { key: h }, h)
              )
            )
          ),
          React.createElement('tbody', null,
            filtered.map((m, i) => {
              const tc = TIER_CONFIG[m.tier] || TIER_CONFIG.Monitor;
              return React.createElement('tr', {
                key: m.country, className: 'gap-row'
              },
                React.createElement('td', { className: 'gap-rank' }, i + 1),
                React.createElement('td', { className: 'gap-country' },
                  m.country),
                React.createElement('td', { className: 'gap-region' },
                  m.region),
                React.createElement('td', null,
                  React.createElement('span', {
                    className: 'gap-tier-badge',
                    style: {
                      color:            tc.color,
                      background:       tc.bg,
                      border: `1px solid ${tc.border}`
                    }
                  }, m.tier)
                ),
                React.createElement('td', { className: 'gap-score' },
                  React.createElement('div', { className: 'gap-score-wrap' },
                    React.createElement('span', {
                      className: 'gap-score-num',
                      style: { color: tc.color }
                    }, m.score),
                    React.createElement('div', { className: 'gap-bar-bg' },
                      React.createElement('div', {
                        className: 'gap-bar-fill',
                        style: {
                          width:      `${m.score}%`,
                          background: tc.color
                        }
                      })
                    )
                  )
                ),
                React.createElement('td', { className: 'gap-pct' },
                  m.gap_pct + '%'),
                React.createElement('td', { className: 'gap-ind' },
                  m.gap_indications),
                React.createElement('td', { className: 'gap-action' },
                  m.action)
              );
            })
          )
        )
      )
    )
  );
}

// ─── App ───
function App(){
  const savedM1=typeof localStorage!=='undefined'?localStorage.getItem('maip_m1'):null;
  const savedM2=typeof localStorage!=='undefined'?localStorage.getItem('maip_m2'):null;
  const init={...initialState};
  if(savedM1)init.m1Model=savedM1;
  if(savedM2)init.m2Model=savedM2;

  const [accessKey,setAccessKey]=React.useState(null);
  const [state,dispatch]=useReducer(reducer,init);
  const [feedbackOpen,setFeedbackOpen]=React.useState(false);
  const [feedbackMessage,setFeedbackMessage]=React.useState(null);
  const [aboutOpen,setAboutOpen]=React.useState(false);
  const [showGap,setShowGap]=React.useState(false);
  const [usageStats,setUsageStats]=React.useState(null);

  const fetchStats=React.useCallback(async()=>{
    try{
      const res=await fetch('/api/stats',{headers:{'x-access-key':sessionStorage.getItem('maip_access_key')||''}});
      if(res.ok){const data=await res.json();setUsageStats(data);}
    }catch(_){}
  },[]);

  useEffect(()=>{
    fetchStats();
    const interval=setInterval(fetchStats,60000);
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{
    const handler=e=>{
      if(e.key==='Escape'){
        if(state.showUpload)dispatch({type:'RESET_UPLOAD'});
        if(state.showSettings)dispatch({type:'SET',payload:{showSettings:false}});
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[state.showUpload,state.showSettings]);

  if(!accessKey)return React.createElement(AccessGate,{onUnlocked:setAccessKey});

  const renderModule=()=>{
    if(!state.sessionId)return React.createElement(OnboardingScreen,{dispatch});
    switch(state.activeModule){
      case 'dashboard':return React.createElement(DashboardModule,{state,dispatch});
      case 'query':return React.createElement(QueryModule,{state,dispatch,onFeedback:(m)=>{setFeedbackMessage(m);setFeedbackOpen(true);},onStatsRefresh:fetchStats});
      case 'intelligence':return React.createElement(IntelligenceModule,{state,dispatch,onStatsRefresh:fetchStats});
      case 'export':return React.createElement(ExportModule,{state});
      default:return React.createElement(DashboardModule,{state,dispatch});
    }
  };

  return React.createElement('div',{className:'app-layout'},
    React.createElement(Sidebar,{state,dispatch,onAbout:()=>setAboutOpen(true),onGap:()=>setShowGap(true)}),
    React.createElement('div',{className:'main-area'},
      React.createElement(Header,{state,dispatch,usageStats}),
      React.createElement('div',{className:'content'},renderModule())
    ),
    state.showUpload&&React.createElement(UploadModal,{state,dispatch}),
    state.showSettings&&React.createElement(SettingsModal,{state,dispatch}),
    feedbackOpen&&React.createElement(FeedbackModal,{message:feedbackMessage,onClose:()=>{setFeedbackOpen(false);setFeedbackMessage(null);}}),
    aboutOpen&&React.createElement(AboutModal,{onClose:()=>setAboutOpen(false)}),
    showGap&&state.sessionId&&React.createElement(GapAnalysisView,{sessionId:state.sessionId,onClose:()=>setShowGap(false)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
